services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: petconnect-app
    container_name: petconnect-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - petconnect-network

  web:
    image: nginx:alpine
    container_name: petconnect-web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - petconnect-network

  db:
    image: mysql:8.0
    container_name: petconnect-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-pet_adoption}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    volumes:
      - petconnect-db-data:/var/lib/mysql
    networks:
      - petconnect-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: petconnect-pma
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${DB_PASSWORD:-root}
    depends_on:
      - db
    networks:
      - petconnect-network

networks:
  petconnect-network:
    driver: bridge

volumes:
  petconnect-db-data:
